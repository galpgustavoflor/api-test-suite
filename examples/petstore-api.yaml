openapi: 3.0.0
info:
  title: Sample Pet Store API
  description: A sample API for testing purposes
  version: 1.0.0
  contact:
    email: api@example.com
servers:
  - url: https://petstore.swagger.io/v2
    description: Production server
paths:
  /pets:
    get:
      summary: List all pets
      description: Returns a list of all pets in the store
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: How many items to return at one time (max 100)
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: A paged array of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Bad request
        '500':
          description: Internal server error
    post:
      summary: Create a pet
      description: Creates a new pet in the store
      tags:
        - pets
      requestBody:
        description: Pet to add to the store
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid input
        '422':
          description: Validation error
  /pets/{petId}:
    get:
      summary: Info for a specific pet
      description: Returns details about a specific pet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found
        '400':
          description: Invalid pet ID
    put:
      summary: Update a pet
      description: Updates an existing pet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to update
          schema:
            type: integer
            format: int64
      requestBody:
        description: Pet data to update
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
      responses:
        '200':
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid input
        '404':
          description: Pet not found
        '422':
          description: Validation error
    delete:
      summary: Delete a pet
      description: Deletes a pet from the store
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to delete
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Pet deleted
        '404':
          description: Pet not found
        '400':
          description: Invalid pet ID
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - tag
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Fluffy"
        tag:
          type: string
          example: "dog"
        status:
          type: string
          enum: [available, pending, sold]
          example: "available"
    NewPet:
      type: object
      required:
        - name
        - tag
      properties:
        name:
          type: string
          example: "Fluffy"
          minLength: 1
          maxLength: 50
        tag:
          type: string
          example: "dog"
          minLength: 1
          maxLength: 20
        status:
          type: string
          enum: [available, pending, sold]
          example: "available"
