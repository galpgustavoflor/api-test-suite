  /aug-gp4c-energy-prices:
    get:
      tags:
        - Market Data
      summary: Retrieve energy prices by market
      description: "This GP4C table displays the energy prices for the different markets and Market Types (intraday vs day-ahead). The table gets data from several sources such as OMIEES and OMIEPT. This table was designed under the scope of the Power Predictive Models project (G4PC, Galp Power Forecasting) and contains data from Spain and Portugal."
      operationId: getAugEnergyPrices
      parameters:
        - name: market
          in: query
          description: Filter by market (Portugal or Spain).
          required: false
          schema:
            type: string
            enum:
              - Portugal
              - Spain
          example: "Portugal"
        - name: market-type
          in: query
          description: Identification of the type of market (intraday or day-ahead) in which the energy price refers to.
          required: false
