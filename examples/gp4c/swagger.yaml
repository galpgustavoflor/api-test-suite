          type: string
          description: Market where the client operates (Portuguese or Spanish).
          example: "Portugal"
        group_id:
          type: string
          description: Identification of the client group type (e.g., Consumption Client - B2B, B2C, or Generation Client).
          example: "Consumption Client - B2B"
