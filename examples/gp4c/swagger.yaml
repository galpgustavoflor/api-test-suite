          type: string
          description: "Client's segment for Consumption Clients. In Portugal: MAT, AT, MT, ETE, BTN. In Spain: 2.0TD, 3.0TD, 6.0TD."
          example: "MAT"
        technology:
          type: string
          description: Type of energy produced by generation clients.
          example: "solar"
        status:
          type: string
          description: Indicates if the client is active or inactive during the period.
          example: "active"
