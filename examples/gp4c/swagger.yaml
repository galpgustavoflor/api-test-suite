components:
  schemas:
    MetadataSchemaDescription:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: Name of the column.
        description:
          type: string
          description: Description of the column's content.
        type:
          type: string
          description: Data type of the column.

    ApiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - error-code
