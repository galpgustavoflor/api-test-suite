          type: number
          format: double
          description: Latitude coordinates of the installation's location for mapping.
          example: 41.065068
        installation_location_longitude:
          type: number
          format: double
          description: Longitude coordinates of the installation's location for mapping.
          example: -8.345496
        installation_address:
          type: string
          description: Address of the installation's location for mapping.
          example: "Parque Eolico de Seboido"
        installation_zip_code:
          type: string
          description: Zip code of the installation's location for mapping.
          example: "2354-343"
        installation_county_name:
          type: string
          description: Municipality name of the installation's zip code.
          example: "Montalegre"
        company_address:
          type: string
          description: Address of the company's location for mapping.
          example: "Avenida da India, N. 8, Alcântara"
        company_zip_code:
          type: string
          description: Zip code of the company's location for mapping.
          example: "1349-065"
        company_county_name:
          type: string
          description: Municipality name of the company's zip code.
          example: "Lisboa"
        contractualized_power:
          type: number
          format: double
          description: Power value contractualized between Galp and the client.
          example: 25.0
        contractualized_power_unit:
          type: string
          description: Unit of the contractualized power value (e.g., kW, kWh, MW, MWh).
          example: "kW"
