openapi: 3.0.1
info:
  title: GP4C API
  description: "The GP4C API is designed to empower the GP4C Platform by enabling the retrieval and submission of client contracts, characteristics, and metering data for energy consumption and generation, alongside critical market insights such as pricing, imbalances, and final positions. It achieves this through a series of well-structured endpoints that aggregate and integrate data from diverse sources, including ARPU, SAPISU, B2BSGP, PMS, REE, REN, STMSES, STMSPT, Nemon, OMIE, and more, ensuring comprehensive support for energy management and forecasting needs."
  contact:
    name: DATA team
    email: DL_DATA_Team@galp.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - url: https://datahubapi.ulysses.galp.com/gp4c/v1
    description: Production server
  - url: https://datahubapi-pre.ulysses.galp.com/gp4c/v1
    description: Pre-production server

paths:
  /aug-gp4c-metering-per-group-type:
    get:
      tags:
        - Metering Data
      summary: Retrieve metering data by group type
      description: "Fetches 15-minute resolution metering data per group type (e.g., generation client - wind, solar; consumption client - B2B, B2C) for energy consumption and generation. Data is sourced from PMS, REE, Smart Meters, ARPU, SAP ISU, and REN."
      operationId: getAugMeteringPerGroupType
      parameters:
        - name: group-id
          in: query
          description: Filter by client group type (e.g., generation client - wind).
          required: false
          schema:
            type: string
            enum:
              - "generation client - wind"
              - "generation client - solar"
              - "consumption client - B2B"
              - "consumption client - B2C"
          example: "generation client - wind"
        - name: initial-timestamp
          in: query
          description: Start of the time range (yyyy-MM-dd HH:mm:ss).
          required: false
          schema:
            type: string
            format: date-time
          example: "2024-09-06 00:00:00"
        - name: final-timestamp
          in: query
          description: End of the time range (yyyy-MM-dd HH:mm:ss).
          required: false
          schema:
            type: string
            format: date-time
          example: "2024-09-06 00:00:00"
        - name: sort-field
          in: query
          description: Field to sort results by.
          required: false
          schema:
            type: string
            default: "initial_timestamp"
          example: "initial_timestamp"
        - name: sort-order
          in: query
          description: Sort direction.
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: "asc"
          example: "asc"
        - name: page-size
          in: query
          description: Number of items per page.
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1000
          example: 1000
        - name: cursor-key
          in: query
          description: Pagination cursor for the next page, obtained from previous response metadata.
          required: false
          schema:
            type: string
          example: "abc123"
        - name: format
          in: query
          description: Response format.
          required: false
          schema:
            type: string
            enum:
              - json
              - csv
            default: "json"
          example: "json"
      responses:
        '200':
          description: Successfully retrieved metering data
          content:
            application/json:
              schema:
                type: object
                required:
                  - metadata
                  - payload
                properties:
                  metadata:
                    type: object
                    required:
                      - schema
                      - count
                      - total_items
                      - total_pages
                    properties:
                      schema:
                        type: array
                        items:
                          $ref: '#/components/schemas/MetadataSchemaDescription'
                      count:
                        type: integer
                        description: Number of items in the current response.
                      cursor_key:
                        type: string
                        description: Cursor for the next page.
                      total_items:
                        type: integer
                        description: Total number of items available.
                      total_pages:
                        type: integer
                        description: Total number of pages available.
                  payload:
                    type: array
                    items:
                      $ref: '#/components/schemas/AugMeteringPerGroupTypePayload'
            text/csv:
              schema:
                type: string
                description: CSV formatted response.
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                           
                      
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - api_key: []

