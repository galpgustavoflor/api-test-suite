openapi: 3.0.3
info:
  title: Sample API with Security
  description: API demonstrating various authentication methods
  version: 1.0.0
  
servers:
  - url: https://api.example.com/v1
    description: Production server

components:
  securitySchemes:
    api_key:
      type: apiKey
      name: CLIENT_ID
      in: header
      description: API key for authentication.
    
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication.
    
    basic_auth:
      type: http
      scheme: basic
      description: Basic HTTP authentication.
    
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://api.example.com/oauth/authorize
          tokenUrl: https://api.example.com/oauth/token
          scopes:
            read: Read access
            write: Write access
      description: OAuth2 authentication.

  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        created_at:
          type: string
          format: date-time

paths:
  /users:
    get:
      summary: List all users
      description: Retrieve a list of all users
      security:
        - api_key: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    post:
      summary: Create a new user
      description: Create a new user account
      security:
        - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '422':
          description: Validation error

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: The user ID

    get:
      summary: Get user by ID
      description: Retrieve a specific user by their ID
      security:
        - api_key: []
        - bearer_auth: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
        '401':
          description: Unauthorized

    put:
      summary: Update user
      description: Update an existing user
      security:
        - oauth2: ['write']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: User not found
        '422':
          description: Validation error

    delete:
      summary: Delete user
      description: Delete a user account
      security:
        - basic_auth: []
      responses:
        '204':
          description: User deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: User not found

  /public/health:
    get:
      summary: Health check
      description: Public endpoint to check API health
      # No security required for this endpoint
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
